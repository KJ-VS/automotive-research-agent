<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="inputGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4"/>
      <stop offset="100%" style="stop-color:#dcfce7"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff"/>
      <stop offset="100%" style="stop-color:#dbeafe"/>
    </linearGradient>
    <linearGradient id="toolGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fefce8"/>
      <stop offset="100%" style="stop-color:#fef08a"/>
    </linearGradient>
    <linearGradient id="storageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf2f8"/>
      <stop offset="100%" style="stop-color:#fce7f3"/>
    </linearGradient>
    <linearGradient id="externalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5"/>
      <stop offset="100%" style="stop-color:#e5e5e5"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="720" fill="#f8fafc" rx="8"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="900" height="48" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="24" width="900" height="24" fill="url(#headerGrad)"/>
  <text x="450" y="31" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Automotive Research Agent — System Architecture</text>

  <!-- ====== INPUT LAYER ====== -->
  <rect x="50" y="70" width="800" height="70" rx="8" fill="url(#inputGrad)" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="70" y="92" fill="#166534" font-size="11" font-weight="bold" opacity="0.7">INPUT</text>
  <!-- User icon -->
  <circle cx="130" cy="110" r="18" fill="#22c55e" opacity="0.15"/>
  <text x="130" y="116" text-anchor="middle" font-size="20">👤</text>
  <text x="160" y="108" fill="#166534" font-size="14" font-weight="bold">User</text>
  <text x="160" y="124" fill="#166534" font-size="12">Enters research topic via CLI</text>

  <!-- Arrow: Input -> main.py -->
  <line x1="450" y1="140" x2="450" y2="170" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- ====== ENTRY POINT ====== -->
  <rect x="300" y="175" width="300" height="55" rx="8" fill="url(#coreGrad)" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="320" y="196" fill="#1e40af" font-size="11" font-weight="bold" opacity="0.7">ENTRY POINT</text>
  <text x="450" y="214" text-anchor="middle" fill="#1e3a5f" font-size="15" font-weight="bold">main.py</text>

  <!-- Arrow: main.py -> agent.py -->
  <line x1="450" y1="230" x2="450" y2="260" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- ====== ORCHESTRATOR ====== -->
  <rect x="250" y="265" width="400" height="55" rx="8" fill="url(#coreGrad)" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="270" y="286" fill="#1e40af" font-size="11" font-weight="bold" opacity="0.7">ORCHESTRATOR</text>
  <text x="450" y="304" text-anchor="middle" fill="#1e3a5f" font-size="15" font-weight="bold">agent.py — ResearchAgent.run()</text>

  <!-- Arrows: agent.py -> Tools -->
  <line x1="310" y1="320" x2="130" y2="370" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="320" x2="310" y2="370" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="320" x2="590" y2="370" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="590" y1="320" x2="770" y2="370" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step labels on arrows -->
  <text x="200" y="340" fill="#6b7280" font-size="10">1. Search</text>
  <text x="340" y="340" fill="#6b7280" font-size="10">2. Fetch</text>
  <text x="540" y="340" fill="#6b7280" font-size="10">3. Read PDFs</text>
  <text x="650" y="340" fill="#6b7280" font-size="10">4. Export</text>

  <!-- ====== TOOLS LAYER ====== -->
  <!-- web_search -->
  <rect x="50" y="375" width="170" height="70" rx="8" fill="url(#toolGrad)" stroke="#facc15" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="135" y="398" text-anchor="middle" fill="#854d0e" font-size="11" font-weight="bold">🔍 web_search.py</text>
  <text x="135" y="416" text-anchor="middle" fill="#a16207" font-size="10">Web Search</text>
  <text x="135" y="432" text-anchor="middle" fill="#ca8a04" font-size="9">Query search engines</text>

  <!-- fetch_page -->
  <rect x="240" y="375" width="170" height="70" rx="8" fill="url(#toolGrad)" stroke="#facc15" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="325" y="398" text-anchor="middle" fill="#854d0e" font-size="11" font-weight="bold">📥 fetch_page.py</text>
  <text x="325" y="416" text-anchor="middle" fill="#a16207" font-size="10">Fetch Pages</text>
  <text x="325" y="432" text-anchor="middle" fill="#ca8a04" font-size="9">Download web pages</text>

  <!-- read_pdf -->
  <rect x="430" y="375" width="170" height="70" rx="8" fill="url(#toolGrad)" stroke="#facc15" stroke-width="1.5" filter="url(#shadow)" opacity="0.6"/>
  <text x="515" y="398" text-anchor="middle" fill="#854d0e" font-size="11" font-weight="bold">📄 read_pdf.py</text>
  <text x="515" y="416" text-anchor="middle" fill="#a16207" font-size="10">Read PDFs</text>
  <text x="515" y="432" text-anchor="middle" fill="#ca8a04" font-size="9">(future feature)</text>

  <!-- export_report -->
  <rect x="620" y="375" width="170" height="70" rx="8" fill="url(#toolGrad)" stroke="#facc15" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="705" y="398" text-anchor="middle" fill="#854d0e" font-size="11" font-weight="bold">📊 export_report.py</text>
  <text x="705" y="416" text-anchor="middle" fill="#a16207" font-size="10">Export Report</text>
  <text x="705" y="432" text-anchor="middle" fill="#ca8a04" font-size="9">Generate Markdown</text>

  <!-- ====== EXTERNAL SYSTEMS ====== -->
  <!-- Internet -->
  <rect x="50" y="480" width="170" height="55" rx="8" fill="url(#externalGrad)" stroke="#d4d4d4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="135" y="503" text-anchor="middle" fill="#525252" font-size="12" font-weight="bold">🌐 Internet</text>
  <text x="135" y="521" text-anchor="middle" fill="#737373" font-size="10">Search Engines / Web Pages</text>

  <!-- Local PDFs -->
  <rect x="430" y="480" width="170" height="55" rx="8" fill="url(#externalGrad)" stroke="#d4d4d4" stroke-width="1.5" filter="url(#shadow)" opacity="0.6"/>
  <text x="515" y="503" text-anchor="middle" fill="#525252" font-size="12" font-weight="bold">📂 Local PDFs</text>
  <text x="515" y="521" text-anchor="middle" fill="#737373" font-size="10">(future feature)</text>

  <!-- Arrows: Tools -> External -->
  <line x1="135" y1="445" x2="135" y2="475" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="325" y1="445" x2="325" y2="475" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="515" y1="445" x2="515" y2="475" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Return arrows -->
  <line x1="155" y1="480" x2="155" y2="450" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="345" y1="480" x2="345" y2="450" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- ====== STORAGE LAYER ====== -->
  <rect x="50" y="570" width="800" height="65" rx="8" fill="url(#storageGrad)" stroke="#f9a8d4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="70" y="592" fill="#9d174d" font-size="11" font-weight="bold" opacity="0.7">STORAGE</text>

  <!-- Cache -->
  <rect x="80" y="600" width="300" height="25" rx="4" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1"/>
  <text x="230" y="617" text-anchor="middle" fill="#9d174d" font-size="11">💾 research/cache/ — Local page cache</text>

  <!-- Final Reports -->
  <rect x="420" y="600" width="300" height="25" rx="4" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1"/>
  <text x="570" y="617" text-anchor="middle" fill="#9d174d" font-size="11">📁 research/final/ — Generated reports</text>

  <!-- Arrows: Tools -> Storage -->
  <line x1="325" y1="445" x2="230" y2="595" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="705" y1="445" x2="570" y2="595" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ====== LEGEND ====== -->
  <rect x="50" y="655" width="800" height="50" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="70" y="675" fill="#475569" font-size="11" font-weight="bold">Legend:</text>
  <rect x="140" y="663" width="14" height="14" rx="3" fill="url(#coreGrad)" stroke="#93c5fd" stroke-width="1"/>
  <text x="160" y="675" fill="#475569" font-size="10">Core</text>
  <rect x="210" y="663" width="14" height="14" rx="3" fill="url(#toolGrad)" stroke="#facc15" stroke-width="1"/>
  <text x="230" y="675" fill="#475569" font-size="10">Tools</text>
  <rect x="280" y="663" width="14" height="14" rx="3" fill="url(#storageGrad)" stroke="#f9a8d4" stroke-width="1"/>
  <text x="300" y="675" fill="#475569" font-size="10">Storage</text>
  <rect x="365" y="663" width="14" height="14" rx="3" fill="url(#externalGrad)" stroke="#d4d4d4" stroke-width="1"/>
  <text x="385" y="675" fill="#475569" font-size="10">External</text>
  <line x1="450" y1="670" x2="480" y2="670" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="488" y="675" fill="#475569" font-size="10">Data flow</text>
  <line x1="555" y1="670" x2="585" y2="670" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="593" y="675" fill="#475569" font-size="10">Return</text>
  <text x="650" y="675" fill="#94a3b8" font-size="10">v0.1 — Scaffolding Phase</text>
</svg>