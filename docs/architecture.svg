<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 760" width="100%" height="100%" style="background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <!-- 阴影滤镜 -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    
    <!-- 箭头标记 -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#475569"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#2563eb"/>
    </marker>

    <!-- 渐变色定义 -->
    <linearGradient id="header-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- 1. 顶栏 Title -->
  <rect x="20" y="20" width="980" height="48" rx="6" fill="url(#header-grad)"/>
  <text x="480" y="50" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="600" letter-spacing="0.5">Research Agent — System Architecture</text>

  <!-- 2. INPUT 层 -->
  <rect x="70" y="88" width="820" height="70" rx="8" fill="#e6f4ea" stroke="#ceead6" stroke-width="1.5"/>
  <text x="90" y="108" fill="#137333" font-size="11" font-weight="700" letter-spacing="0.8">INPUT</text>
  <!-- User 整体移动到水平中间 (x=480) -->
  <g transform="translate(480, 110)">
    <!-- 用户图标 (相对于组中心对齐) -->
    <circle cx="-60" cy="12" r="8" fill="#5f6368"/>
    <path d="M -72 28 C -72 21, -66 18, -60 18 C -54 18, -48 21, -48 28 Z" fill="#5f6368"/>
    <!-- 文字靠图标右侧 (x=-38) -->
    <text x="-38" y="15" fill="#202124" font-size="15" font-weight="600">User</text>
    <text x="-38" y="31" fill="#5f6368" font-size="12">Initiates query / command</text>
  </g>

  <!-- 3. ENTRY POINT 层 -->
  <rect x="330" y="180" width="300" height="45" rx="8" fill="#e8f0fe" stroke="#aecbfa" stroke-width="1.5" filter="url(#drop-shadow)"/>
  <text x="340" y="194" fill="#1a73e8" font-size="9" font-weight="700" letter-spacing="0.8">ENTRY POINT</text>
  <text x="480" y="208" text-anchor="middle" fill="#202124" font-size="14" font-weight="600" font-family="monospace">main.py</text>

  <!-- 4. ORCHESTRATOR 层 -->
  <rect x="230" y="250" width="500" height="50" rx="8" fill="#e8f0fe" stroke="#aecbfa" stroke-width="1.5" filter="url(#drop-shadow)"/>
  <text x="240" y="264" fill="#1a73e8" font-size="9" font-weight="700" letter-spacing="0.8">ORCHESTRATOR</text>
  <text x="480" y="281" text-anchor="middle" fill="#202124" font-size="14" font-weight="600" font-family="monospace">agent.py — ResearchAgent.run()</text>

  <!-- ============================== -->
  <!-- 5. 工具层 -->
  <!-- ============================== -->

  <!-- 5.1 核心流水线分组 -->
  <g transform="translate(30, 330)">
    <rect x="0" y="0" width="700" height="110" rx="10" fill="#fffef0" stroke="#fde293" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="10" y="18" fill="#b06000" font-size="10" font-weight="700" letter-spacing="0.8">CORE MODULES PIPELINE</text>

    <!-- Search Engine -->
    <g transform="translate(15, 25)">
      <rect x="0" y="0" width="160" height="70" rx="8" fill="#fef7e0" stroke="#fde293" stroke-width="1.5" filter="url(#drop-shadow)"/>
      <text x="80" y="28" text-anchor="middle" fill="#202124" font-size="13" font-weight="600">Search Engine</text>
      <text x="80" y="48" text-anchor="middle" fill="#b06000" font-size="12" font-family="monospace">web_search.py</text>
    </g>

    <!-- Fetch Engine -->
    <g transform="translate(185, 25)">
      <rect x="0" y="0" width="160" height="70" rx="8" fill="#fef7e0" stroke="#fde293" stroke-width="1.5" filter="url(#drop-shadow)"/>
      <text x="80" y="28" text-anchor="middle" fill="#202124" font-size="13" font-weight="600">Fetch Engine</text>
      <text x="80" y="48" text-anchor="middle" fill="#b06000" font-size="12" font-family="monospace">fetch_page.py</text>
    </g>

    <!-- Summary Engine -->
    <g transform="translate(355, 25)">
      <rect x="0" y="0" width="160" height="70" rx="8" fill="#fef7e0" stroke="#fde293" stroke-width="1.5" filter="url(#drop-shadow)"/>
      <text x="80" y="28" text-anchor="middle" fill="#202124" font-size="13" font-weight="600">Summary Engine</text>
      <text x="80" y="48" text-anchor="middle" fill="#b06000" font-size="12" font-family="monospace">summarize.py</text>
    </g>

    <!-- Report Engine -->
    <g transform="translate(525, 25)">
      <rect x="0" y="0" width="160" height="70" rx="8" fill="#fef7e0" stroke="#fde293" stroke-width="1.5" filter="url(#drop-shadow)"/>
      <text x="80" y="28" text-anchor="middle" fill="#202124" font-size="13" font-weight="600">Report Engine</text>
      <text x="80" y="48" text-anchor="middle" fill="#b06000" font-size="12" font-family="monospace">export_report.py</text>
    </g>

    <!-- 流水线连线 -->
    <path d="M 175 60 L 185 60" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
    <path d="M 345 60 L 355 60" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
    <path d="M 515 60 L 525 60" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- 5.2 PDF 处理分组 -->
  <g transform="translate(745, 330)">
    <rect x="0" y="0" width="185" height="110" rx="10" fill="#f0fdf4" stroke="#ceead6" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="10" y="18" fill="#137333" font-size="10" font-weight="700" letter-spacing="0.8">Local PDF Handling (Future)</text>

    <!-- PDF Reader -->
    <g transform="translate(12.5, 25)">
      <rect x="0" y="0" width="160" height="70" rx="8" fill="#ffffff" stroke="#ceead6" stroke-width="1.5" filter="url(#drop-shadow)"/>
      <text x="80" y="32" text-anchor="middle" fill="#188038" font-size="13" font-weight="600">PDF Reader</text>
      <text x="80" y="52" text-anchor="middle" fill="#b06000" font-size="12" font-family="monospace">read_pdf.py</text>
    </g>
  </g>

  <!-- ============================== -->
  <!-- 6. EXTERNAL / STORAGE 底层 -->
  <!-- ============================== -->

  <!-- Internet -->
  <g transform="translate(30, 520)">
    <rect x="0" y="0" width="175" height="60" rx="8" fill="#f1f3f4" stroke="#dadce0" stroke-width="1.5"/>
    <text x="87.5" y="28" text-anchor="middle" fill="#3c4043" font-size="13" font-weight="600">Internet</text>
    <text x="87.5" y="45" text-anchor="middle" fill="#70757a" font-size="11">Web Search Engine</text>
  </g>

  <!-- Storage 容器包围盒 -->
  <rect x="215" y="505" width="715" height="115" rx="8" fill="#fce8e6" stroke="#fad2cf" stroke-width="1.5"/>
  <text x="230" y="523" fill="#c5221f" font-size="10" font-weight="700" letter-spacing="0.8">STORAGE</text>

  <!-- Cache Dir -->
  <g transform="translate(230, 540)">
    <rect x="0" y="0" width="280" height="48" rx="6" fill="#ffffff" stroke="#f28b82" stroke-width="1.2"/>
    <text x="140" y="22" text-anchor="middle" fill="#b0120a" font-size="12" font-weight="600" font-family="monospace">research/cache/</text>
    <text x="140" y="38" text-anchor="middle" fill="#5f6368" font-size="11">Local HTML &amp; Raw Data Cache</text>
  </g>

  <!-- Final Dir -->
  <g transform="translate(630, 540)">
    <rect x="0" y="0" width="280" height="48" rx="6" fill="#ffffff" stroke="#f28b82" stroke-width="1.2"/>
    <text x="140" y="22" text-anchor="middle" fill="#b0120a" font-size="12" font-weight="600" font-family="monospace">research/final/</text>
    <text x="140" y="38" text-anchor="middle" fill="#5f6368" font-size="11">Generated Reports &amp; Outputs</text>
  </g>

  <!-- ============================== -->
  <!-- 7. 连接线与流向 -->
  <!-- ============================== -->

  <!-- User -> main.py -->
  <path d="M 480 158 L 480 180" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- main.py -> ResearchAgent -->
  <path d="M 480 225 L 480 250" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Agent 调用流水线头部 -->
  <path d="M 430 300 L 125 355" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  
  <!-- Agent 调用 PDF (虚线) -->
  <path d="M 530 300 L 837 355" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-dashed)"/>

  <!-- Tools -> External / Storage 下向连线 -->
  <!-- Search Engine -> Internet -->
  <path d="M 110 400 L 110 520" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Fetch Engine -> cache -->
  <path d="M 280 400 L 340 540" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Report Engine -> final -->
  <path d="M 620 400 L 730 540" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- PDF Reader (Future) -> final (虚线) -->
  <path d="M 837 400 L 770 540" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-dashed)"/>

  <!-- 8. 图例 -->
  <g transform="translate(20, 680)">
    <rect x="0" y="0" width="980" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="20" y="30" fill="#475569" font-size="12" font-weight="700">Legend:</text>
    
    <!-- Core -->
    <rect x="90" y="18" width="18" height="18" rx="4" fill="#e8f0fe" stroke="#aecbfa"/>
    <text x="115" y="32" fill="#334155" font-size="12">Core Engine</text>

    <!-- Tools -->
    <rect x="210" y="18" width="18" height="18" rx="4" fill="#fef7e0" stroke="#fde293"/>
    <text x="235" y="32" fill="#334155" font-size="12">Tools (Current)</text>

    <!-- Storage -->
    <rect x="360" y="18" width="18" height="18" rx="4" fill="#fce8e6" stroke="#fad2cf"/>
    <text x="385" y="32" fill="#334155" font-size="12">Local Storage</text>

    <!-- External -->
    <rect x="500" y="18" width="18" height="18" rx="4" fill="#f1f3f4" stroke="#dadce0"/>
    <text x="525" y="32" fill="#334155" font-size="12">External</text>

    <!-- Arrows -->
    <line x1="610" y1="27" x2="640" y2="27" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="648" y="32" fill="#334155" font-size="12">Internal Flow</text>

    <line x1="770" y1="27" x2="800" y2="27" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-dashed)"/>
    <text x="808" y="32" fill="#334155" font-size="12">Future Flow (Tools &amp; Data)</text>
  </g>
</svg>
